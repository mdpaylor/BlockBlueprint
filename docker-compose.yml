services:
  db:
    image: postgres:17
    container_name: blox-blueprint-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: blox_blueprint
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "MyPassword!"

    ports:
      - "5433:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: