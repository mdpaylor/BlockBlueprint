db:
  image: postgres
  container_name: blox-blueprint-db
  restart: unless-stopped

  environment:
    POSTGRES_DB: blox_blueprint
    POSTGRESS_USER: postgres
    POSTGRES_PASSWORD: MyPassword!

  ports:
    - "5432:5432"

  volumes:
    - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: